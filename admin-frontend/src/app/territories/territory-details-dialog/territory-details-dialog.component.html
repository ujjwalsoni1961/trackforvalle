<h2 mat-dialog-title>Territory Details: {{ data.name }}</h2>
<mat-dialog-content>
  <div class="flex flex-col gap-4">
    <div>
      <h3 class="text-lg font-semibold">Postal Codes</h3>
      <p>{{ formatArray(data.postal_codes) }}</p>
    </div>
    <div>
      <h3 class="text-lg font-semibold">Regions</h3>
      <p>{{ formatArray(data.regions) }}</p>
    </div>
    <div>
      <h3 class="text-lg font-semibold">Subregions</h3>
      <p>{{ formatArray(data.subregions) }}</p>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
