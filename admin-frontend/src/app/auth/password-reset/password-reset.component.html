<div class="flex flex-wrap h-screen mat-typography bg-surface">
  <div class="flex w-full flex-col md:w-1/2 h-screen">
    <div class="p-8">
      <a emr-logo routerLink="/" class="text-2xl font-bold text-primary">TRACK</a>
    </div>
    <div class="grow px-6 md:px-12 lg:px-20 flex items-center justify-center">
      <div class="w-full max-w-md">
        <h2 class="text-2xl font-semibold text-neutral-800 dark:text-neutral-100">Password Reset</h2>
        <p class="text-xl mt-3 text-neutral-500 text-sm leading-relaxed">
          We sent a password reset link to 
          <span class="text-neutral-800 dark:text-neutral-100 font-medium">{{email || 'your email'}}</span>.
        </p>
        @if (errorMessage) {
          <div class="mt-4 p-3 bg-red-100 text-red-700 text-sm rounded-md">{{errorMessage}}</div>
        }
        @if (successMessage) {
          <div class="mt-4 p-3 bg-green-100 text-green-700 text-sm rounded-md">{{successMessage}}</div>
        }
        <div class="mt-8">
          <p class="text-xl text-neutral-600 dark:text-neutral-400">
            Didn't receive the email? 
            <button style="cursor: pointer;" class="font-semibold text-primary dark:text-accent hover:underline focus:outline-none" 
                    (click)="resendCode()">Click to resend</button>
          </p>
        </div>
        <div class="flex items-center justify-between absolute bottom-7 lg:w-[29rem]">
          <div class="flex items-center justify-center gap-3">
            <div class="w-8 h-8 border border-default rounded-full text-sm text-neutral-400 flex items-center justify-center">1</div>
            <div class="w-8 h-8 border border-default rounded-full text-sm border-neutral-800 flex items-center justify-center">2</div>
            <div class="w-8 h-8 border border-default rounded-full text-sm text-neutral-400 flex items-center justify-center">3</div>
            <div class="w-8 h-8 border border-default rounded-full text-sm text-neutral-400 flex items-center justify-center">4</div>
          </div>
          <a routerLink="/auth/sign-in" class="text-xs font-medium text-neutral-400 dark:text-neutral-300
                                             hover:text-primary dark:hover:text-accent inline-flex items-center gap-1">
            <mat-icon class="text-base">arrow_back</mat-icon> Back to login
          </a>
        </div>
      </div>
    </div>
  </div>
  <div class="pointer-events-none relative hidden h-screen flex items-center
              justify-center select-none bg-surface-container md:flex md:w-1/2">
    <img class="z-1 max-w-[80%] w-full mx-auto" ngSrc="assets/onboarding/step1.svg" alt="Onboarding" fill>
  </div>
</div>
