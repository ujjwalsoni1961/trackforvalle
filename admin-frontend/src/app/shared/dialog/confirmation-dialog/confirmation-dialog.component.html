<div class="p-6 max-w-[400px]">
  <h2 class="text-xl font-medium mb-4">{{ data.title }}</h2>
  <p class="text-gray-600 dark:text-gray-300 mb-6">{{ data.message }}</p>
  
  <div class="flex justify-end gap-3">
    <button 
      mat-stroked-button 
      (click)="onCancel()"
      class="!border-neutral-300 dark:!border-neutral-600 !text-neutral-700 dark:!text-neutral-200 hover:!bg-neutral-100 dark:hover:!bg-neutral-700"
    >
      {{ data.cancelText }}
    </button>
    <button 
      mat-flat-button 
      color="primary" 
      (click)="onConfirm()"
      class="!bg-primary-600 hover:!bg-primary-700"
    >
      {{ data.confirmText }}
    </button>
  </div>
</div>
